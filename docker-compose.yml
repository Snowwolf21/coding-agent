services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
      - WORKSPACE_ROOT=/app/workspace
    volumes:
      - .:/app/workspace

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
